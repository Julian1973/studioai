<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Crystal Bears Studio</title>
<style>
:root{
  --bg:#f6f5fb;--surface:#fff;--ink:#1c1830;--muted:#6b6685;--hint:#9a95b0;--line:#e7e4f2;
  --brand:#534AB7;--brandbg:#EEEDFE;--brandink:#3C3489;
  --spark:#854F0B;--sparkbg:#FAEEDA;--deep:#993C1D;--deepbg:#FAECE7;--heart:#993556;--heartbg:#FBEAF0;
  --conn:#3C3489;--connbg:#EEEDFE;--rip:#0F6E56;--ripbg:#E1F5EE;--ok:#0F6E56;--okbg:#E1F5EE;--info:#185FA5;--infobg:#E6F1FB;
}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.5}
.top{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;background:var(--surface);border-bottom:1px solid var(--line)}
.brand{display:flex;align-items:center;gap:10px;font-weight:600;font-size:16px;cursor:pointer}
.logo{width:28px;height:28px;border-radius:8px;background:var(--brandbg);color:var(--brand);display:flex;align-items:center;justify-content:center}
.toplinks{display:flex;gap:8px;align-items:center}
.tl{font-size:13px;color:var(--muted);padding:6px 12px;border-radius:8px;cursor:pointer}
.tl:hover{background:var(--brandbg);color:var(--brandink)}
.tl.on{background:var(--brandbg);color:var(--brandink);font-weight:600}
.epchip{font-size:12px;color:var(--brandink);background:var(--brandbg);border-radius:8px;padding:5px 12px}
.gates{display:flex;gap:8px;align-items:center;padding:9px 18px;background:var(--surface);border-bottom:1px solid var(--line);font-size:12px;color:var(--hint);flex-wrap:wrap}
.gates .on{color:var(--brandink);font-weight:600}.gates .done{color:var(--ok)}
.shell{display:flex;min-height:calc(100vh - 98px)}
.nav{width:172px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--line);padding:10px}
.nav a{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:8px;color:var(--muted);text-decoration:none;cursor:pointer;margin-bottom:2px}
.nav a.active{background:var(--brandbg);color:var(--brandink);font-weight:600}.nav a:hover:not(.active){background:#f1eff8}
.nav .sep{border-top:1px solid var(--line);margin:8px 6px}
.main{flex:1;padding:22px 26px;min-width:0}
.h1{font-size:21px;font-weight:600;margin:0 0 2px}.sub{color:var(--muted);font-size:13px;margin:0 0 18px}
.epgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px}
.epcard{background:var(--surface);border:1px solid var(--line);border-radius:14px;overflow:hidden;cursor:pointer;transition:border-color .12s}
.epcard:hover{border-color:var(--brand)}
.epthumb{height:96px;background:#26215c;display:flex;align-items:center;justify-content:center;color:#CECBF6;font-size:13px}
.epbody{padding:12px 14px}
.epbody .n{font-size:11px;color:var(--hint);font-weight:600}
.epbody .t{font-size:15px;font-weight:600;margin:2px 0 6px}
.epbody .l{font-size:12px;color:var(--muted);line-height:1.4;height:50px;overflow:hidden}
.stat{display:inline-flex;align-items:center;gap:5px;font-size:10px;border-radius:6px;padding:3px 8px;margin-top:8px}
.addcard{border:1.5px dashed var(--line);border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;color:var(--brand);cursor:pointer;min-height:170px;font-weight:500}
.addcard:hover{border-color:var(--brand);background:var(--brandbg)}
.form{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:18px 20px;max-width:640px}
.form label{display:block;font-size:12px;color:var(--muted);font-weight:600;margin:12px 0 4px}
.form input,.form textarea{width:100%;border:1px solid var(--line);border-radius:8px;padding:9px 11px;font:inherit;background:#fff}
.form textarea{min-height:220px;resize:vertical;font-size:13px;line-height:1.5}
.btn{background:var(--brand);color:#fff;border:none;border-radius:8px;padding:10px 18px;font:inherit;font-weight:600;cursor:pointer;margin-top:14px}
.btn.ghost{background:transparent;color:var(--muted);border:1px solid var(--line);margin-left:8px}
.scene{margin-bottom:24px}
.scenehd{display:flex;align-items:center;gap:10px;margin:0 0 10px}.scenehd b{font-size:14px}.scenehd .ct{font-size:12px;color:var(--hint)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px}
.card{background:var(--surface);border:1px solid var(--line);border-radius:12px;overflow:hidden;cursor:pointer;transition:border-color .12s}.card:hover{border-color:var(--brand)}
.thumb{height:108px;display:flex;align-items:center;justify-content:center;position:relative;background:#efeef6}
.thumb img{width:100%;height:100%;object-fit:cover}.thumb .ph{font-size:24px;opacity:.55}
.badge{position:absolute;top:8px;left:8px;font-size:10px;font-weight:600;background:rgba(255,255,255,.92);border-radius:6px;padding:2px 7px}
.wb{position:absolute;top:8px;right:8px;font-size:9px;font-weight:600;border-radius:6px;padding:2px 6px}
.play{position:absolute;right:8px;bottom:8px;width:26px;height:26px;border-radius:50%;background:rgba(38,33,92,.85);color:#fff;display:flex;align-items:center;justify-content:center}
.cbody{padding:9px 11px}.crow{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
.pill{font-size:10px;border-radius:6px;padding:2px 7px}.act{font-size:12.5px;line-height:1.4;margin-bottom:4px}.meta{font-size:11px;color:var(--hint);margin-bottom:6px}
.dlg{font-size:11px;color:var(--muted);font-style:italic;border-left:2px solid var(--line);padding-left:7px;margin-bottom:7px}
.st{display:inline-flex;align-items:center;gap:4px;font-size:10px;border-radius:6px;padding:2px 7px}
.srow{display:flex;gap:10px;align-items:flex-start;padding:8px 10px;border:1px solid var(--line);border-radius:8px;margin-bottom:6px;cursor:pointer;background:var(--surface)}
.srow:hover{border-color:var(--brand)}.srow .num{font-size:11px;font-weight:600;color:var(--brandink);min-width:46px}
.mcards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:22px}
.mc{background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:13px 15px}.mc[onclick]{cursor:pointer;transition:border-color .12s,box-shadow .12s,transform .12s}.mc[onclick]:hover{border-color:var(--brand);box-shadow:0 3px 14px rgba(108,92,231,.16);transform:translateY(-1px)}.mc .lab{font-size:12px;color:var(--muted)}.mc .num{font-size:24px;font-weight:600;margin-top:3px}
.bar{height:7px;border-radius:4px;background:#eceaf4;overflow:hidden;margin-top:8px}.bar>i{display:block;height:100%;background:var(--brand)}
.scriptbox{background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:16px 18px;white-space:pre-wrap;font-size:13px;line-height:1.6;max-height:520px;overflow:auto}
.bible{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:8px 26px;max-width:820px}
.bible h1{font-size:20px}.bible h2{font-size:17px;border-top:1px solid var(--line);padding-top:14px}.bible h3{font-size:15px}
.bible table{border-collapse:collapse;width:100%;font-size:12.5px;margin:8px 0}.bible th,.bible td{border:1px solid var(--line);padding:5px 8px;text-align:left}
.modal{position:fixed;inset:0;background:rgba(28,24,48,.5);display:none;align-items:center;justify-content:center;padding:24px;z-index:10}.modal.show{display:flex}
.sheet{background:var(--surface);border-radius:14px;max-width:760px;width:100%;max-height:88vh;overflow:auto;padding:20px 22px}
.media{width:100%;border-radius:10px;background:#efeef6;margin:12px 0;max-height:380px;object-fit:contain}
.kv{font-size:12px;color:var(--muted);margin:10px 0 3px;font-weight:600;text-transform:uppercase;letter-spacing:.03em}
.prompt{font-size:12.5px;background:#f6f5fb;border:1px solid var(--line);border-radius:8px;padding:10px 12px;white-space:pre-wrap;color:#2a2640}
.x{float:right;cursor:pointer;color:var(--muted);font-size:20px;border:none;background:none}
.coming{color:var(--hint);font-size:13px;padding:40px;text-align:center;border:1px dashed var(--line);border-radius:12px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
.pulse{animation:pulse 1.1s ease-in-out infinite}
.live{display:flex;align-items:center;gap:9px;margin:8px 2px;padding:9px 13px;background:var(--infobg);color:var(--info);border-radius:9px;font-weight:600;font-size:13px}
/* ── Gate-flow spine: the 4-gate rail + active panel ── */
.grail{display:flex;align-items:stretch;gap:0;margin:14px 0 4px;flex-wrap:nowrap;overflow-x:auto;padding-bottom:4px}
.gnode{flex:1;min-width:118px;text-align:center;padding:11px 8px 10px;border:1.5px solid var(--line);border-radius:12px;background:var(--surface);cursor:pointer;transition:box-shadow .25s,border-color .25s,transform .2s;position:relative}
.gnode:hover{border-color:var(--brand)}
.gnode.active{border-color:var(--brand);box-shadow:0 0 0 3px var(--brandbg)}
.gnode.locked{opacity:.55;cursor:default}
.gnode.locked:hover{border-color:var(--line)}
.gnode .gglyph{font-size:18px;line-height:1;margin-bottom:5px;font-weight:700}
.gnode .gnum{font-size:9px;letter-spacing:.08em;color:var(--hint)}
.gnode .gname{font-size:12.5px;font-weight:600;margin:1px 0 1px}
.gnode .gph{font-size:10px;font-weight:600}
.gconn{align-self:center;flex:0 0 26px;height:3px;background:var(--line);transition:background .4s}
.gconn.fill{background:var(--ok)}
.justUnlocked{animation:justUnlocked 1.3s ease-out 1}
@keyframes justUnlocked{0%{box-shadow:0 0 0 0 var(--brand)}40%{box-shadow:0 0 0 6px var(--brandbg)}100%{box-shadow:0 0 0 3px var(--brandbg)}}
.sstrip{display:flex;gap:7px;flex-wrap:wrap;margin:2px 0 2px}
.schip{padding:5px 13px;border:1px solid var(--line);border-radius:20px;background:var(--surface);cursor:pointer;font-size:12.5px;font-weight:600;transition:border-color .2s}
.schip:hover{border-color:var(--brand)}
.schip.on{border-color:var(--brand);background:var(--brandbg);color:var(--brandink)}
.apanel{border:1.5px solid var(--brand);border-radius:14px;padding:16px 17px;margin-top:10px;background:var(--surface)}
.bigfire{font-size:14.5px;font-weight:700;padding:12px 22px;border-radius:10px;background:var(--brand);color:#fff;border:none;cursor:pointer}
.bigfire:hover{background:var(--brandink)}
.bigsign{font-size:14.5px;font-weight:700;padding:12px 22px;border-radius:10px;background:var(--ok);color:#fff;border:none;cursor:pointer}
.bigsign:hover{filter:brightness(1.08)}
.minds{font-size:11px;color:var(--brandink);letter-spacing:.02em}
/* ── Linear Gated Cascade (Ticket 4): stage rail + per-beat timeline + panel ── */
.crail{display:flex;align-items:stretch;gap:0;margin:14px 0 6px;flex-wrap:nowrap;overflow-x:auto;padding-bottom:4px}
.cstage{flex:1;min-width:104px;text-align:center;padding:10px 8px 9px;border:1.5px solid var(--line);border-radius:12px;background:var(--surface);cursor:pointer;transition:box-shadow .25s,border-color .25s,opacity .25s;position:relative}
.cstage:hover:not(.locked){border-color:var(--brand)}
.cstage.active{border-color:var(--brand);box-shadow:0 0 0 3px var(--brandbg)}
.cstage.locked{opacity:.5;cursor:not-allowed}
.cstage.done{border-color:var(--ok)}
.cstage .cglyph{font-size:17px;line-height:1;margin-bottom:4px;font-weight:700}
.cstage .cnum{font-size:9px;letter-spacing:.08em;color:var(--hint)}
.cstage .cname{font-size:12.5px;font-weight:600;margin:1px 0 1px}
.cstage .cph{font-size:10px;font-weight:600}
.cconn{align-self:center;flex:0 0 22px;height:3px;background:var(--line);transition:background .4s}
.cconn.fill{background:var(--ok)}
.ctl{display:flex;flex-direction:column;gap:6px;margin:10px 0 0}
.cbeat{display:flex;align-items:center;gap:11px;padding:9px 12px;border:1px solid var(--line);border-radius:10px;background:var(--surface);cursor:pointer;transition:border-color .15s,background .15s}
.cbeat:hover{border-color:var(--brand)}
.cbeat.current{border-color:var(--brand);box-shadow:0 0 0 2px var(--brandbg)}
.cbeat.locked{opacity:.55;cursor:not-allowed}
.cbeat .cbdot{flex:0 0 22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
.cbeat .cbcode{font-weight:700;font-size:12.5px;min-width:52px}
.cbeat .cbact{flex:1;min-width:0;font-size:12.5px;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cbeat .cbst{font-size:10.5px;font-weight:600;border-radius:6px;padding:2px 8px;white-space:nowrap}
.cpanel{border:1.5px solid var(--brand);border-radius:14px;padding:16px 17px;margin-top:14px;background:var(--surface)}
.cjson{width:100%;min-height:240px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:11.5px;line-height:1.45;padding:11px;border:1px solid var(--line);border-radius:8px;box-sizing:border-box;resize:vertical;background:#fbfaff;color:#2a2640}
.cgate-note{font-size:11.5px;color:#8a6d00;background:#fdf3d0;border-radius:7px;padding:8px 11px;margin:8px 0}
/* ── click-to-enlarge lightbox (keyframes + scene plate) ── */
img.zoom{cursor:zoom-in;transition:filter .12s ease}
img.zoom:hover{filter:brightness(1.04)}
.thumb img.zoom:hover{filter:brightness(1.08)}
#lightbox{position:fixed;inset:0;z-index:9999;background:rgba(18,14,38,.88);backdrop-filter:blur(3px);display:none;align-items:center;justify-content:center;flex-direction:column;padding:26px;box-sizing:border-box}
#lightbox.open{display:flex}
#lbimg{max-width:94vw;max-height:84vh;object-fit:contain;border-radius:10px;box-shadow:0 12px 60px rgba(0,0,0,.55);background:#0e0b1c;cursor:zoom-in;transition:transform .15s ease;transform-origin:center}
#lbimg.zoomed{cursor:zoom-out}
#lbcap{color:#e9e7f6;font-size:12.5px;margin-top:13px;display:flex;gap:16px;align-items:center;max-width:94vw}
#lbcap a{color:#c3bcf3;text-decoration:none}#lbcap a:hover{text-decoration:underline}
#lbclose{position:absolute;top:14px;right:22px;color:#fff;font-size:28px;line-height:1;cursor:pointer;opacity:.8}
#lbclose:hover{opacity:1}
</style>
</head>
<body>
<div class="top">
  <div class="brand" onclick="goHome()"><span class="logo">◈</span> Crystal Bears Studio</div>
  <div class="toplinks" id="toplinks"></div>
</div>
<div id="gatesbar"></div>
<div class="shell">
  <nav class="nav" id="nav" style="display:none"></nav>
  <main class="main" id="view"></main>
</div>
<div class="modal" id="modal"><div class="sheet" id="sheet"></div></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<script>
const BASE="http://localhost:8765";
const PILL={Spark:["--spark","--sparkbg"],Deepening:["--deep","--deepbg"],Heart:["--heart","--heartbg"],Connection:["--conn","--connbg"],Ripple:["--rip","--ripbg"]};
const cap=s=>s?s[0].toUpperCase()+s.slice(1):s;
const v=n=>getComputedStyle(document.documentElement).getPropertyValue(n);
let EPISODES=[],MEDIA=[],CUR=null,SHOTS=[],PREFIX="",page="episodes",MEDIA_V=0,CHARCFG={},SCENELIB=null,RETAKES_DRAFT=[],RT_SN=null;

// ── ONE PIPE (scene-spine). Script in → the Pipeline runs each scene Storyboard→Keyframes→Animation→Post, locked
//    until the prior stage is signed, scenes unlocking in order. Cascade + the standalone boards are gone (one door per action).
const NAV=[["script","Script","✎"],["pipeline","Pipeline","⚙"],["__sep","",""],["continuity","Continuity","✔"]];

function mediaFor(s){const codes=[s&&s.shotCode,s&&s.id].filter(x=>x!=null&&x!=="");const slug=s&&s.slug;
  // Show the keyframe/clip for the beat's CURRENT slug — NOT just the first .png matching the code. Multiple
  // generations can leave several files per code (old KF_v2, retired slugs); keying on the exact slug makes the
  // studio show the SAME file the backend writes (Ep1_{code}_{slug}.png), so a stale one can never shadow it.
  for(const c of codes){const pre=PREFIX+c+"_";const f=MEDIA.filter(m=>m.startsWith(pre));if(!f.length)continue;
    const exact=(ext)=>slug&&f.includes(pre+slug+ext)?pre+slug+ext:null;
    return{key:  exact(".png")||f.find(m=>m.endsWith(".png")),
           clip: exact(".mp4")||f.find(m=>m.endsWith(".mp4")&&!m.includes("BROADCAST")),
           final:f.find(m=>m.endsWith("BROADCAST.mp4"))};}
  return{};}
function statusOf(m){if(m.final)return["--ok","--okbg","● final"];if(m.clip)return["--info","--infobg","● clip"];if(m.key)return["--ok","--okbg","● keyframe"];return["--hint",null,"○ draft"];}
// ── THE UNIT IS THE BEAT (10–12s). A beat directs its own internal cuts. Old episodes may still be
//    shot-shaped — normalise a beat so every existing view renders it; legacy shots pass straight through. ──
function normBeat(b){
  if(!b||b.shotCode||!b.beatCode) return b;                 // already shot-shaped (legacy) or not a beat
  const cuts=b.cuts||[], dlg=cuts.filter(c=>c.dialogue).map(c=>c.dialogue).join("   ");
  const f0=(cuts[0]&&cuts[0].framing)||"";
  return Object.assign({}, b, {
    _beat:true, _cuts:cuts,
    shotCode:b.beatCode, duration:b.durationSec, action:b.storyBeat||"",
    dialogue:dlg||null, speaker:(b.speakers||[])[0]||null,
    shotSize:(f0?f0.split(/[,(]/)[0].trim():(cuts.length+" cuts")), movement:b.cameraArc||"", angle:"", lens:"",
    intent:{pillar:cap(b.pillar||"spark"), intensity:b.intensity, beat:b.emotionalIntent||"", emotion:"", musicMood:b.soundIntent||""}
  });
}

var CURRENT_PROJECT=null, PROJECTS=[], WIZ=null;
const ANIM_TYPES=[
  {v:"3D CGI (Pixar/Bluey)",d:"Rendered 3D — soft lighting, depth, fur/texture."},
  {v:"2D hand-drawn (cel)",d:"Traditional drawn — linework, painted frames."},
  {v:"2D vector / flat",d:"Modern flat / motion-graphic — clean bold shapes."},
  {v:"Stop-motion / claymation",d:"Tactile — clay, puppets, real-set lighting."}
];
function projConfig(){return (CURRENT_PROJECT&&CURRENT_PROJECT.configBase)||"engine/config";}
function _esc(s){return (''+(s==null?'':s)).replace(/[<>&]/g,function(c){return {'<':'&lt;','>':'&gt;','&':'&amp;'}[c];});}
async function bootProjects(){
  try{PROJECTS=(((await fetch(BASE+"/api/projects",{cache:"no-store"}).then(r=>r.json()))||{}).projects)||[];}catch(e){PROJECTS=[];}
  CURRENT_PROJECT=null; CUR=null; SHOTS=[]; page="projects"; renderTop(); renderNav(); renderProjects();
}
function renderProjects(){
  const card=p=>`<div class="mc" onclick='enterProject(${JSON.stringify(p.id)})' style="cursor:pointer;display:flex;flex-direction:column;gap:6px" title="Open ${_esc(p.name)}">
    <div style="font-weight:700;font-size:16px">${_esc(p.name)}${p.primary?' <span style="font-size:10px;color:var(--hint);font-weight:400">· primary</span>':''}</div>
    <div style="font-size:11px;color:var(--brandink);font-weight:600">${_esc(p.animationType||'—')}</div>
    ${p.premise?`<div style="font-size:12px;color:var(--hint);line-height:1.5">${_esc((p.premise||'').slice(0,150))}${(p.premise||'').length>150?'…':''}</div>`:''}
    <div style="font-size:11px;color:var(--hint);margin-top:4px">${p.episodeCount||0} episode${p.episodeCount==1?'':'s'} · ${p.characterCount||0} characters${p.aspectRatio?' · '+_esc(p.aspectRatio):''}</div>
    <div style="margin-top:4px"><span class="tl on" style="font-size:12px">Open →</span></div>
  </div>`;
  document.getElementById("view").innerHTML=`
    <h1 class="h1">Projects</h1>
    <p class="sub">Each project is a self-contained show — its own bible, characters, animation type and episodes. Drop in a new show bible + character references to spin up a project that drives animation.</p>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px">${PROJECTS.map(card).join("")}
      <div class="mc" onclick="openProjectWizard()" style="cursor:pointer;display:flex;align-items:center;justify-content:center;border:1px dashed var(--brand);min-height:130px"><div style="text-align:center;color:var(--brandink)"><div style="font-size:30px;line-height:1">＋</div><div style="font-weight:600;margin-top:4px">New Project</div></div></div>
    </div>`;
}
async function enterProject(id){
  const p=PROJECTS.find(x=>x.id===id); if(!p){alert("Project not found");return;}
  CURRENT_PROJECT=p; CUR=null; SHOTS=[]; page="episodes"; boot();
}
function exitProject(){ bootProjects(); }
/* ---- New Project wizard ---- */
function openProjectWizard(){ WIZ={step:1, data:{aspectRatio:"16:9",episodeLength:"11-min episode",voiceProvider:"ElevenLabs"}, chars:[]}; renderWizard(); document.getElementById("modal").classList.add("show"); }
function wizSet(k,v){WIZ.data[k]=v;}
function wizNext(){ if(WIZ.step<6){WIZ.step++;renderWizard();} }
function wizBack(){ if(WIZ.step>1){WIZ.step--;renderWizard();} }
function wizCapture(){
  const g=id=>{const e=document.getElementById(id);return e?e.value:undefined;};
  const map={wz_name:"name",wz_premise:"premise",wz_audience:"audience",wz_eplen:"episodeLength",wz_aspect:"aspectRatio",wz_style:"style",wz_bible:"showBible",wz_voice:"voiceProvider",wz_music:"musicStyle"};

async function renameEp(num){
  const ep=EPISODES.find(e=>e.number==num); const cur=(ep&&ep.title)||"";
  const t=prompt("Rename Episode "+num+":", cur);
  if(t==null) return;                          // cancelled
  const title=t.trim();
  if(!title){alert("The episode name can't be empty.");return;}
  if(title===cur) return;
  try{
    const r=await fetch(BASE+"/api/episode-rename",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({number:+num,title})});
    const j=await r.json();
    if(!j.ok){alert("Rename failed: "+(j.error||"failed"));return;}
    EPISODES=j.episodes;
    if(CUR&&CUR.number==num) CUR=EPISODES.find(e=>e.number==num)||CUR;
    if(page=="episodes") renderEpisodes(); else { renderTop&&renderTop(); if(typeof renderPipeline=="function"&&page=="pipeline") renderPipeline(); }
  }catch(e){alert("Can't reach the studio server. Reload (Cmd-Shift-R).");}
}

async function refreshPipe(){
  try{PIPE=await (await fetch(BASE+"/api/pipeline")).json();}catch(e){}
  const jobs=Object.values(PIPE.jobs||{});
  if(_seenDone===null){_seenDone={};jobs.forEach(j=>{if(j.status!="running")_seenDone[j.jobId]=1;});}
  let done=false,finished=[];jobs.forEach(j=>{if(j.status!="running"&&!_seenDone[j.jobId]){_seenDone[j.jobId]=1;done=true;finished.push(j);}});
  const anyRunning=jobs.some(j=>j.status=="running");
  if(done){try{await fetch(BASE+"/api/reindex");MEDIA=await fetch(BASE+"/cb-studio/data/media-index.json",{cache:"no-store"}).then(r=>r.json());MEDIA_V=Date.now();}catch(e){}if(page!="pipeline"&&page!="script")render();}
  else if(anyRunning){
    // a batch job (e.g. Gate 2b building every beat in a scene) is ONE long-running subprocess — the server now
    // reindexes media incrementally as each beat finishes, so poll it too instead of waiting for the whole batch
    // to exit, or an early-finished beat's keyframe stays invisible for the rest of the run.
    try{MEDIA=await fetch(BASE+"/cb-studio/data/media-index.json",{cache:"no-store"}).then(r=>r.json());MEDIA_V=Date.now();}catch(e){}
    if(page=="pipeline")renderPipeline();
  }
  finished.forEach(j=>{const st=j.status;const ic=st=="done"?'✓':st=="stopped"?'■':'✗';const tail=st=="done"?'finished — review & sign off':st=="stopped"?'stopped':'failed — see log';showToast(`${ic} ${jobLabel(j)} · Scene ${j.scene} ${tail}`,st=="done");});
  if(finished.some(j=>String(j.gate)=="write"&&j.status=="done")&&CUR){

    CUR=EPISODES.find(e=>e.number==CUR.number)||CUR;

  }

    try{EPISODES=await fetch(BASE+"/cb-studio/data/episodes.json",{cache:"no-store"}).then(r=>r.json());}catch(e){}
    await openEpisode(CUR.number); return;
  }
  if(page=="pipeline"){
    // Only re-render when something actually changed. The 3s poll otherwise rebuilds the panel each tick, recreating
    // every <video> element so each reloads — that's the FLICKER. Skip it when jobs/locks/media are unchanged.

  else if(page=="script")renderScript();
}

function gApprovedG(sn,g){const lk=gateState(sn);return g==2?(!!(lk["2a"]&&lk["2b"])||!!lk[2]):!!lk[g];}
function gatePhase(sn,g){
  if(gApprovedG(sn,g))return 'signed';

  if(job&&job.status=="running")return 'running';

  if(!fireable)return 'locked';

  if(g==1)return SHOTS.some(s=>s.sceneNumber==sn)?'review':'ready';  // Gate 1 output is the beats (data) — beats exist ⇒ review & sign off
  if(gateProduced(sn,g))return 'review';

function scenePrevSigned(sn){const sl=scenesList(),i=sl.indexOf(sn);return i<=0?true:gatePhase(sl[i-1],5)=='signed';}

function panelGate(sn){return (FOCUSGATE&&gatePhase(sn,FOCUSGATE)!='locked')?FOCUSGATE:activeGateOf(sn);}
function defaultScene(){const sl=scenesList();return sl.find(sn=>gatePhase(sn,5)!='signed')||sl[sl.length-1];}
function setScene(sn){if(!scenePrevSigned(sn)){showToast("🔒 Sign off the previous scene first",false);return;}CURSCENE=sn;FOCUSGATE=null;renderPipeline();}
function focusGate(sn,g){if(gatePhase(sn,g)=='locked')return;FOCUSGATE=(FOCUSGATE==g?null:g);renderPipeline();}
function advanceAfterSignoff(sn,signedGate){
  if(String(signedGate)=='5'){            // scene complete (Gate 5 = Post) → unlock + jump to the next scene (the scene-spine)
    const sl=scenesList(),nextScene=sl[sl.indexOf(sn)+1];
    CURSCENE=(nextScene!=null?nextScene:sn);FOCUSGATE=null;renderPipeline();
    showToast(nextScene!=null?`✓✓ Scene ${sn} complete → Scene ${nextScene} unlocked`:`✓✓ Scene ${sn} complete — all scenes done`,true);
    return;
  }
  CURSCENE=sn;FOCUSGATE=null;renderPipeline();
  const nx=activeGateOf(sn);
  setTimeout(()=>{const el=document.querySelector('.gnode.active');if(el){el.classList.add('justUnlocked');el.scrollIntoView({behavior:'smooth',block:'nearest'});}},60);
  showToast(`✓ Gate ${signedGate} signed → Gate ${nx} unlocked · press to fire`,true);
}
async function stopFiring(jobId){
  try{
    const r=await fetch(BASE+"/api/stop",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(jobId?{jobId}:{})});
    const j=await r.json();
    if(j&&j.jobs)PIPE.jobs=j.jobs;
    if(typeof showToast=="function")showToast("■ Firing stopped"+(j&&j.stopped&&j.stopped.length>1?` (${j.stopped.length} jobs)`:""),true);
    renderPipeline();setTimeout(refreshPipe,300);
  }catch(e){alert("Can't reach the studio server to stop. Reload (Cmd-Shift-R).");}
}

    </div>
    <p class="sub" style="margin-top:2px">Press to activate a gate, watch it run, review it, sign it off — the next gate unlocks. ${scenes.length>1?"Pick a scene, then walk it through all four gates.":""}</p>`;

function renderSceneStrip(scenes){
  return `<div class="sstrip">`+scenes.map(sn=>{
    if(!scenePrevSigned(sn))return `<div class="schip" style="opacity:.4;cursor:default" title="Locked — finish & sign off the previous scene first">🔒 Scene ${sn}</div>`;
    const done=gatePhase(sn,4)=="signed",ag=activeGateOf(sn),m=PHASE_META[done?"signed":gatePhase(sn,ag)];
    return `<div class="schip ${sn==CURSCENE?"on":""}" onclick="setScene(${sn})"><span style="color:${m.c}">${m.g}</span> Scene ${sn}${done?"":" · G"+ag}</div>`;
  }).join("")+`</div>`;
}
function renderGateRail(sn){
  const act=panelGate(sn);
  let h='<div class="grail">';
  GATE_DEF.forEach((d,i)=>{
    const g=d[0],ph=gatePhase(sn,g),m=PHASE_META[ph];
    if(i>0)h+=`<div class="gconn ${gatePhase(sn,g-1)=="signed"?"fill":""}"></div>`;
    h+=`<div class="gnode ${g==act?"active":""} ${ph=="locked"?"locked":""}" onclick="focusGate(${sn},${g})" title="Built to the minds of: ${d[3]}">
      <div class="gglyph" style="color:${m.c}">${m.g}</div>
      <div class="gnum">GATE ${g}</div><div class="gname">${d[1]}</div>
      <div class="gph" style="color:${m.c}">${m.lab}</div></div>`;
  });
  return h+"</div>";
}

}

      if(job)body+=gateLog(job);

function animCard(s){

    ? `<video src="${BASE}/engine/media/${clip}?v=${MEDIA_V}" muted preload="metadata" playsinline style="width:100%;height:100%;object-fit:cover"></video><span class="play">►</span>`

    <div class="cbody"><div class="crow"><span class="meta" style="margin:0">${meta}</span><span class="pill" style="color:${v(pc[0])};background:${v(pc[1])}">${cap((s.intent||{}).pillar)}</span></div>
    <div class="act">${_esc((s.action||'').length>70?s.action.slice(0,70)+"…":(s.action||''))}</div>
    <span class="st" style="color:${clip?'var(--ok)':'var(--hint)'}">${clip?'● clip':'○ empty'}</span>${noteChip(s)}</div></div>`;
}

function retakeListHTML(){
  return RETAKES_DRAFT.length?RETAKES_DRAFT.map((r,i)=>{let dir='';if(r.checking)dir=`<div style="margin-top:5px;font-size:11.5px;color:var(--hint)">✦ Director check…</div>`;else if(r.brief&&r.brief.action)dir=`<div style="margin-top:5px;font-size:11.5px;color:var(--brandink);background:#eef0fb;border-radius:5px;padding:5px 7px"><b>✦ Director:</b> ${_esc(r.brief.action)}${(r.brief.flags&&r.brief.flags.length)?`<div style="color:var(--danger);margin-top:3px">⚑ ${_esc(r.brief.flags.join('; '))}</div>`:''}</div>`;else if(r.briefErr)dir=`<div style="margin-top:5px;font-size:11.5px;color:var(--hint)">✦ Director check unavailable — your note runs as-is.</div>`;return `<div style="padding:6px 9px;background:#f6f5fb;border-radius:6px;margin-bottom:5px;font-size:12.5px"><div style="display:flex;gap:8px;align-items:flex-start"><code style="color:var(--brandink)">${_esc(r.ref)}</code><span style="flex:1">→ ${_esc(r.change)}</span><span onclick="checkRetake(${i})" title="re-run the director check" style="cursor:pointer;color:var(--brandink);margin-right:6px">↻</span><span onclick="fireRetakes(RT_SN,${i})" title="fire JUST this one (test it lands)" style="cursor:pointer;color:var(--brandink);font-weight:700;margin-right:4px">▶ test</span><span onclick="removeRetake(${i})" title="remove" style="cursor:pointer;color:var(--danger);font-weight:700">✕</span></div>${dir}</div>`;}).join(""):`<div style="font-size:12px;color:var(--hint)">No retakes added yet.</div>`;
}
function renderRetakeList(){const el=document.getElementById('rt_list');if(el)el.innerHTML=retakeListHTML();const fb=document.getElementById('rt_fire');if(fb)fb.textContent=`▶ Fire ALL ${RETAKES_DRAFT.length} — Gate 4`;}
function addRetake(){const re=document.getElementById('rt_ref'),ce=document.getElementById('rt_change'),ie=document.getElementById('rt_issue');const ref=((re&&re.value)||'').trim(),change=((ce&&ce.value)||'').trim(),issue=((ie&&ie.value)||'').trim();if(!ref||!change){alert('Enter a shot Ref (e.g. 1.B4#shot7) and the change.');return;}const isTC=/^\d+:[0-5]?\d(\.\d+)?$/.test(ref)||/^\d+(\.\d+)?s?$/.test(ref),isRef=/^\d+\.B[0-9a-zA-Z]+#shot\d+$/.test(ref);if(!isTC&&!isRef){alert('Enter a timecode (e.g. 0:50) or a shot Ref (1.B4#shot7) — read it off the review video.');return;}RETAKES_DRAFT.push({ref,change,issue});const idx=RETAKES_DRAFT.length-1;if(re)re.value='';if(ce)ce.value='';if(ie)ie.value='';renderRetakeList();checkRetake(idx);}
async function checkRetake(i){const r=RETAKES_DRAFT[i];if(!r)return;r.checking=true;r.briefErr=false;renderRetakeList();try{const res=await fetch(BASE+"/api/retake-brief",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({scene:String(RT_SN),episode:"Ep"+CUR.number,ref:r.ref,issue:r.issue||"",change:r.change})});const j=await res.json();r.checking=false;if(j&&j.ok&&j.brief&&j.brief.action){r.brief=j.brief;r.briefErr=false;}else{r.brief=null;r.briefErr=true;}}catch(e){r.checking=false;r.briefErr=true;}renderRetakeList();}
function removeRetake(i){RETAKES_DRAFT.splice(i,1);renderRetakeList();}
async function fireRetakes(sn,idx){const list=(idx==null)?RETAKES_DRAFT.slice():(RETAKES_DRAFT[idx]?[RETAKES_DRAFT[idx]]:[]);if(!list.length){alert('Add a retake first.');return;}try{const r=await fetch(BASE+"/api/retakes",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({scene:String(sn),episode:"Ep"+CUR.number,retakes:list})});const j=await r.json();if(!j.ok){alert("Couldn't start the retake: "+(j.error||"failed"));return;}setTimeout(refreshPipe,250);/* keep the list — fire one to test, review, fire the rest; sign off Gate 4 only when happy */}catch(e){alert("Can't reach the studio server. Reload (Cmd-Shift-R).");}}
function uploadRetakeCSV(sn,input){const f=input&&input.files&&input.files[0];if(!f)return;const rd=new FileReader();rd.onload=async()=>{try{const r=await fetch(BASE+"/api/retake-csv",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({scene:String(sn),episode:"Ep"+CUR.number,csv:rd.result})});const j=await r.json();if(!j.ok){alert("Couldn't run the sheet: "+(j.error||"failed"));return;}setTimeout(refreshPipe,250);}catch(e){alert("Can't reach the studio server. Reload (Cmd-Shift-R).");}};rd.readAsText(f);input.value='';}
async function loadRetakeLog(sn){if(sn==null)return;try{const r=await fetch(BASE+"/api/retake-log?scene="+encodeURIComponent(sn)+"&episode=Ep"+CUR.number);const j=await r.json();const el=document.getElementById('rt_log');if(!el)return;const es=(j.entries||[]);el.innerHTML=es.length?es.map(retakeLogCard).join(""):`<div style="font-size:12px;color:var(--hint)">No retakes fired yet — fire one above and its <b>before / after</b> appears here.</div>`;}catch(e){}}
function retakeLogCard(e){const src=f=>`${BASE}/engine/media/${f}?v=${MEDIA_V}`;const vid=(f,lab)=>f?`<div style="flex:1;min-width:170px"><div style="font-size:10.5px;letter-spacing:.04em;color:var(--hint);margin-bottom:3px">${lab}</div><video src="${src(f)}" muted loop autoplay playsinline style="width:100%;border-radius:6px;background:#000"></video></div>`:`<div style="flex:1;min-width:170px;font-size:11px;color:var(--hint)">${lab}: —</div>`;const stat=e.ok?`<span style="color:var(--ok)">✓ landed</span>`:`<span style="color:var(--danger)">✗ ${_esc(e.error||'failed')}</span>`;const seam=(e.seam_delta!=null)?` · seam Δ ${e.seam_delta}`:'';return `<div class="mc" style="margin-top:8px"><div style="display:flex;justify-content:space-between;align-items:baseline;font-size:12.5px"><code style="color:var(--brandink)">${_esc(e.ref)}</code><span style="font-size:11.5px">${stat}${seam}</span></div><div style="font-size:12px;margin:4px 0 2px">→ ${_esc(e.change)}</div>${e.action?`<div style="font-size:11px;color:var(--brandink);background:#eef0fb;border-radius:5px;padding:4px 7px;margin:5px 0"><b>✦ Director:</b> ${_esc(e.action)}</div>`:''}<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:5px">${vid(e.before,'BEFORE')}${vid(e.after,'AFTER ✦ retaken')}</div></div>`;}
function retakeForm(sn){RT_SN=sn;return `<div class="mc" style="margin-top:10px;border:1px solid var(--brand)"><div class="lab" style="color:var(--brandink);font-weight:600">Retakes — type the timecode + the change</div><div style="font-size:12px;color:var(--hint);margin:6px 0 10px">Read the <b>timecode</b> off the review video (e.g. <code>0:50</code>) — it maps to the shot at that moment — then say what&rsquo;s wrong and how you want it, and Add. The <b>Director</b> reads your note against the shot + the character bibles and shows you the precise, continuity-locked retake wording it will render (<span style="color:var(--brandink)">✦ Director</span>); <b>↻</b> re-checks. (A shot Ref like <code>1.B4#shot7</code> works too. ) Use <b>▶ test</b> to fire ONE and see it land, or <b>Fire ALL</b>. Firing never signs off Gate 4 — iterate freely, then sign off only when you&rsquo;re happy.</div><input id="rt_ref" placeholder="Timecode — e.g. 0:50 (or a shot Ref)" style="width:100%;box-sizing:border-box;padding:8px;border:1px solid var(--line);border-radius:6px;margin-bottom:6px;font-family:monospace"><input id="rt_issue" placeholder="Issue — what's wrong (optional, helps the director)" style="width:100%;box-sizing:border-box;padding:8px;border:1px solid var(--line);border-radius:6px;margin-bottom:6px"><textarea id="rt_change" placeholder="Change to — how you want this shot instead" style="width:100%;box-sizing:border-box;padding:8px;border:1px solid var(--line);border-radius:6px;min-height:54px"></textarea><button class="btn" style="margin-top:6px" onclick="addRetake()">+ Add retake</button><div id="rt_list" style="margin-top:10px">${retakeListHTML()}</div><button id="rt_fire" class="bigfire" style="margin-top:10px" onclick="fireRetakes(${sn})">▶ Fire ALL ${RETAKES_DRAFT.length} — Gate 4</button><div style="margin-top:14px;border-top:1px solid var(--line);padding-top:10px"><div class="lab" style="font-weight:600">Retake log — before / after</div><div style="font-size:11.5px;color:var(--hint);margin:4px 0 2px">Each shot you fire shows up here as <b>BEFORE</b> vs <b>AFTER</b> — just the changed clip, so you see how it landed without scrubbing the whole scene.</div><div id="rt_log" style="margin-top:6px"></div></div><div class="mc" style="margin-top:12px;background:#faf9fe"><div class="lab" style="font-weight:600">Or upload the amended sheet</div><div style="font-size:12px;color:var(--hint);margin:5px 0 8px">Download the CSV (the <b>&darr; retake sheet</b> link above), <b>delete the rows that are fine</b>, keep only the shots + your changes, then choose the file here — it runs those shots straight through the same director check.</div><input type="file" accept=".csv,text/csv" onchange="uploadRetakeCSV(RT_SN,this)" style="font-size:12px"></div></div>`;}
function gateArtifacts(sn,g){
  const ss=SHOTS.filter(s=>s.sceneNumber==sn);
  if(g==1)return beatListReview(ss);
  const _final=MEDIA.find(m=>new RegExp("^"+PREFIX+"Scene"+sn+"_complete\\.mp4$").test(m));
  const _rev=MEDIA.find(m=>new RegExp("^"+PREFIX+"Scene"+sn+"_REVIEW\\.mp4$").test(m));
  const _csv=`${BASE}/engine/media/${PREFIX}Scene${sn}_RETAKES.csv`;
  const _player=(file,lab,sub)=>`<div class="mc" style="border:1px solid var(--brand);margin-top:10px"><div class="lab" style="color:var(--brandink);font-weight:600">${lab}</div><video controls src="${BASE}/engine/media/${file}?v=${MEDIA_V}" style="width:100%;border-radius:8px;margin-top:8px;max-height:440px"></video><div style="font-size:11px;color:var(--hint);margin-top:6px">${sub}</div></div>`;
  const _reviewBlock=(lab)=>_rev?_player(_rev,lab,`Timecode + frame + the live BEAT / SHOT / Ref + in&ndash;out burned in &mdash; watch this, then mark up the retakes: <a href="${_csv}" download style="color:var(--brandink);text-decoration:underline">&darr; retake sheet (CSV)</a>`):`<div class="coming" style="margin-top:10px">The timecoded review copy appears here once Gate 3 (Animation) finishes.</div>`;
  if(g==3)return `${sceneComplete(sn)}<div class="grid" style="margin-top:10px">${ss.map(card).join("")}</div>`+_reviewBlock(`▶ Scene ${sn} — timecoded review copy (for retakes)`);
  if(g==4)return _reviewBlock(`▶ Scene ${sn} — review copy (read the timecode)`)+retakeForm(sn);
  if(g==5)return _final?_player(_final,`✓ Scene ${sn} — FINAL mix`,`stitched, mastered &minus;14 LUFS · stems for CapCut`):`<div class="coming">The final mix appears here once Post (Gate 5) runs.</div>`;
  return "";
}
function _clip(t,n){t=""+(t||"");return (t.length>n?t.slice(0,n)+"…":t).replace(/</g,"&lt;");}
function beatListReview(ss){
  return `<div style="font-size:12px;color:var(--hint);margin-bottom:8px">${ss.length} beat${ss.length==1?"":"s"} — review the soul of each (want vs need, the crystal truth, the kid &amp; adult read), then sign off. Click a beat to open &amp; edit.</div>`+ss.map(s=>{
    const wn=(s.want||s.need)?`<div style="font-size:11.5px;margin-top:4px">${s.want?`<span style="text-decoration:line-through;opacity:.55">wants: ${_clip(s.want,64)}</span> &nbsp;`:""}${s.need?`<span style="color:var(--brandink);font-weight:600">needs: ${_clip(s.need,64)}</span>`:""}</div>`:"";
    const rd=(s.kidRead||s.adultRead)?`<div style="font-size:11px;color:var(--muted);margin-top:3px">${s.kidRead?`<b>Kid:</b> ${_clip(s.kidRead,84)}`:""}${s.adultRead?` &nbsp;<b>Adult:</b> ${_clip(s.adultRead,84)}`:""}</div>`:"";
    return `<div onclick="openShot(${s.id})" style="border:1px solid var(--line);border-radius:9px;padding:9px 11px;margin-bottom:7px;cursor:pointer">
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap"><b style="font-size:12.5px">${s.shotCode}</b>
        <span class="pill" style="font-size:10px;padding:1px 7px">${cap(s.intent.pillar)}</span>
        <span style="font-size:11px;color:var(--hint)">${s.duration}s · ${(s._cuts||[]).length} cuts</span>
        ${s.crystalTruth?`<span style="font-size:10.5px;font-weight:600;color:var(--brandink)" title="crystal truth — the Need made visible">◈ ${_clip(s.crystalTruth,48)}</span>`:""}
        ${s.wordlessHeld?`<span style="font-size:10px;font-weight:600;color:var(--brandink);background:var(--brandbg);border-radius:5px;padding:1px 6px">◈ wordless-held</span>`:""}</div>
      <div style="font-size:12px;margin-top:3px">${_clip(s.storyBeat||s.action||"",128)}</div>${wn}${rd}</div>`;
  }).join("");
}
async function reFire(sn,g){ if(g!=1 && !confirm(`Re-fire Gate ${g} for Scene ${sn}? This re-runs the pipeline over the existing output.`))return; fireGate(sn,g,true); }
async function unsignGate(sn,g){
  if(g==2)return unsignSub(sn,"2b");
  if(!confirm(`Un-sign Gate ${g} for Scene ${sn}?\n\nThis removes the sign-off and re-locks every gate after it, so you can alter and sign off again.`))return;
  try{const r=await fetch(BASE+"/api/unapprove",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({scene:String(sn),gate:String(g),episode:"Ep"+CUR.number})});const j=await r.json();if(!j.ok){alert("Un-sign failed: "+(j.log||j.error||""));return;}PIPE.locked=j.locked;FOCUSGATE=null;renderPipeline();}catch(e){alert("Can't reach the studio server. Reload (Cmd-Shift-R).");}

function setCmp(val){const e=document.getElementById('cmpEnd'),l=document.getElementById('cmpLine');if(e)e.style.clipPath='inset(0 0 0 '+val+'%)';if(l)l.style.left=val+'%';}

  document.getElementById("sheet").innerHTML=`<button class="x" onclick="closeM()">×</button><h3>${isB?'Beat':'Shot'} ${s.shotCode||s.id} · Scene ${s.sceneNumber} · ${s.scene}</h3>

  const cutsEdit=EB.cuts.map((c,i)=>`<div style="border:1px solid var(--line);border-radius:8px;padding:8px;margin-top:6px"><div style="display:flex;justify-content:space-between;align-items:center"><b style="font-size:12px">Cut ${i+1}</b><button class="btn ghost" style="padding:1px 8px;font-size:11px" onclick="ebDelCut(${i})">✕</button></div>${ta('eb_cut_framing_'+i,c.framing,'framing — shot size + angle + movement',36)}${ta('eb_cut_action_'+i,c.action,'action',42)}${ta('eb_cut_dialogue_'+i,c.dialogue,'dialogue (optional)',30)}${ta('eb_cut_delivery_'+i,c.delivery,'delivery (optional)',28)}</div>`).join('');
  document.getElementById("sheet").innerHTML=`<button class="x" onclick="closeM()">×</button>
    <h3>✎ Edit beat ${EB.code}${EB.scene?' · Scene '+EB.scene:''}</h3>
    <p class="sub" style="margin:0 0 4px">Edit the beat, its internal cuts and the Seedance side — saved straight to the beat package.</p>
    ${fld('Story beat','storyBeat','',58)}
    ${fld('Physical feeling — the body sensation in the first ~2s (felt, not seen)','physicalFeeling','the lurch / held breath / warmth…',42)}
    <div class="kv" style="margin-top:14px;color:var(--brandink)">North Star — the beat's soul (Inside Out, put outside)</div>
    <div style="font-size:11px;color:var(--hint);margin:2px 0 6px">The Want is the face; the Need is the truth under it; the crystal makes the Need visible. No villain — the Crystal Call is a surrender. These drive the Director, voice and animation.</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      ${fld('Wants (the outward want — the face)','want','what the character is chasing on the surface',38)}${fld('Needs (the truth under the want)','need','what they actually need — contradicts the face',38)}
      ${fld('◈ Crystal truth — the Need made visible/audible','crystalTruth','what the crystal shows or sounds',38)}${fld('The game (the Bluey co-watch layer)','theGame','the playful/comedic engine of the beat',38)}
      ${fld('Kid read — what a 4–8 year-old sees','kidRead','the surface story a child follows',38)}${fld('Adult read — what a parent feels','adultRead','the layer that lands for the grown-up',38)}
    </div>
    ${fld('◈ Wordless-held — if this is THE silent beat, what the held moment carries (leave blank if not)','wordlessHeld','only the nadir/surrender beat; silence carries it',32)}
    <div class="kv" style="margin-top:12px;color:var(--brandink)">Keyframe — what the opening still actually renders</div>
    ${fld('Opening pose (startState) — the held pose at the first frame','startState','where each character is, facing, doing — the static opening',54)}
    ${fld('Lighting — the scene light (also serves the feeling)','lighting')}
    <div style="font-size:11px;color:var(--hint);margin-top:4px">Framing comes from <b>Cut 1's framing</b> below. Opening pose + lighting + Cut 1 framing — plus the scene plate and character refs — are what build the keyframe.</div>
    <div class="kv" style="margin-top:14px;color:var(--brandink)">Extra references for THIS beat only — e.g. the pier + Keen &amp; Mum inside Aida's vision</div>
    <div style="font-size:11px;color:var(--hint);margin:2px 0 6px">Applies to this beat's keyframe only, not the rest of the scene. Extra characters get their locked sheet; the first scene shot becomes THIS beat's scene (e.g. the pier inside Aida's vision), any more are insets.</div>
    <div class="kv">Extra characters</div>
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin:4px 0">${(EB.extraChars||[]).length?(EB.extraChars||[]).map((c,i)=>`<span style="background:var(--chip,#efeef6);border-radius:6px;padding:3px 9px;font-size:12px">${c} <a onclick="ebDelChar(${i})" style="cursor:pointer;color:#c0392b">✕</a></span>`).join(''):'<span style="font-size:12px;color:var(--hint)">none</span>'}</div>
    <div style="display:flex;gap:6px">${(()=>{const opts=charNames().filter(c=>!(EB.beatChars||[]).includes(c)&&!(EB.extraChars||[]).includes(c));return opts.length?`<select id="eb_addchar" style="flex:1;padding:6px;border:1px solid var(--line);border-radius:7px;font:inherit;font-size:12px">${opts.map(c=>`<option value="${c}">${c}</option>`).join('')}</select><button class="btn ghost" onclick="ebAddChar()">＋ Add character</button>`:'<span style="font-size:12px;color:var(--hint)">all characters already in this beat</span>';})()}</div>
    <div class="kv" style="margin-top:10px">Extra scene shots</div>
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin:4px 0">${(EB.extraScenes||[]).length?(EB.extraScenes||[]).map((p,i)=>`<span style="background:var(--chip,#efeef6);border-radius:6px;padding:3px 9px;font-size:12px">${String(p).split('/').pop()} <a onclick="ebDelScene(${i})" style="cursor:pointer;color:#c0392b">✕</a></span>`).join(''):'<span style="font-size:12px;color:var(--hint)">none</span>'}</div>
    <div style="display:flex;gap:6px"><select id="eb_addscene" style="flex:1;padding:6px;border:1px solid var(--line);border-radius:7px;font:inherit;font-size:12px">${sceneShotOptions().map(o=>`<option value="${o.path.replace(/"/g,'&quot;')}">${o.label.replace(/</g,'&lt;')}</option>`).join('')}</select><button class="btn ghost" onclick="ebAddScene()">＋ Add scene shot</button></div>
    <div class="kv" style="margin-top:12px;color:var(--brandink)">Feeling-first fields — each aimed at that feeling (the clip)</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      ${fld('Camera — viewer↔subject relationship','cameraArc')}${fld('Atmosphere — builds toward it','atmosphere')}
      ${fld('Motion tempo — lands on it','motionTempo')}${fld('Grade — preserves it after','grade')}
      ${fld('Crystal glow','crystalGlow')}
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
      ${fld('Perf — surface','perf_surface')}${fld('Perf — underneath','perf_underneath')}${fld('Perf — inner thought','perf_innerThought')}
    </div>
    ${fld('Continuity','continuity')}
    <div class="kv" style="margin-top:12px">Internal cuts — Seedance performs these in order</div>
    <div>${cutsEdit||'<div style="font-size:12px;color:var(--hint)">No cuts yet.</div>'}</div>
    <button class="btn ghost" style="margin-top:6px" onclick="ebAddCut()">＋ Add cut</button>
    ${fld('Seedance seed (LEGACY — not sent; the clip uses the Seedance prompt on the beat card)','i2vPrompt','',80)}
    <div style="display:flex;gap:8px;margin-top:16px;align-items:center"><button class="btn" onclick="ebSave()">✓ Save beat</button><button class="btn ghost" onclick="openShot(EB.id)">Cancel</button><span id="eb_msg" style="font-size:12px;color:var(--brandink)"></span></div>`;
}
async function ebSave(){
  ebCapture(); const f=EB.f, msg=document.getElementById("eb_msg"); if(msg)msg.textContent="Saving…";
  let _cont=f.continuity; try{const _p=JSON.parse(_cont); if(_p&&typeof _p==='object')_cont=_p;}catch(e){}
  const updates={storyBeat:f.storyBeat,physicalFeeling:f.physicalFeeling,want:f.want,need:f.need,crystalTruth:f.crystalTruth,theGame:f.theGame,kidRead:f.kidRead,adultRead:f.adultRead,wordlessHeld:f.wordlessHeld,startState:f.startState,lighting:f.lighting,cameraArc:f.cameraArc,atmosphere:f.atmosphere,motionTempo:f.motionTempo,grade:f.grade,crystalGlow:f.crystalGlow,continuity:_cont,i2vPrompt:f.i2vPrompt,performance:{surface:f.perf_surface,underneath:f.perf_underneath,innerThought:f.perf_innerThought},extraScenes:EB.extraScenes||[],extraChars:EB.extraChars||[]};
  const cuts=EB.cuts.map((c,i)=>{const o={n:i+1,framing:c.framing,action:c.action};if(c.dialogue)o.dialogue=c.dialogue;if(c.delivery)o.delivery=c.delivery;return o;});
  try{const r=await fetch(BASE+"/api/beat-update",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({package:EB.pkg,beatCode:EB.code,updates,cuts})});const j=await r.json();
    if(!j.ok){alert("Error: "+(j.error||"failed"));if(msg)msg.textContent="";return;}
    closeM(); await reloadBeats();
  }catch(e){alert("Can't reach the studio server. Reload (Cmd-R).");if(msg)msg.textContent="";}
}


async function boot(){
  const epf=(CURRENT_PROJECT&&CURRENT_PROJECT.episodesFile)||"cb-studio/data/episodes.json";
  try{[EPISODES,MEDIA,CHARCFG]=await Promise.all([fetch(BASE+"/"+epf,{cache:"no-store"}).then(r=>r.json()),fetch(BASE+"/cb-studio/data/media-index.json").then(r=>r.json()).catch(()=>[]),fetch(BASE+"/"+projConfig()+"/characters.json",{cache:"no-store"}).then(r=>r.json()).catch(()=>({}))]);MEDIA_V=Date.now();}catch(e){document.getElementById("view").innerHTML='<div class="coming">Start the server: python3 cb-studio/serve.py</div>';return;}
  renderTop();renderNav();render();
}
if(!window._pipeTimer){window._pipeTimer=setInterval(()=>{
  if(CUR&&(page=="pipeline"||Object.values(PIPE.jobs||{}).some(j=>j.status=="running")))refreshPipe();
},3000);}
// ── click-to-enlarge lightbox: any img.zoom (keyframes + scene plate) opens an in-app graphical view ──
function openLightbox(src,cap){var lb=document.getElementById('lightbox'),im=document.getElementById('lbimg');im.classList.remove('zoomed');im.style.transform='';im.src=src;document.getElementById('lbcaptxt').textContent=cap||'';document.getElementById('lborig').href=src;lb.classList.add('open');}
function closeLightbox(){var lb=document.getElementById('lightbox');lb.classList.remove('open');document.getElementById('lbimg').src='';}
function lbToggleZoom(e){if(e)e.stopPropagation();var im=document.getElementById('lbimg'),z=im.classList.toggle('zoomed');im.style.transform=z?'scale(2)':'';}
// capture phase so this fires BEFORE (and instead of) any parent card's openShot onclick
document.addEventListener('click',function(e){var t=e.target;if(t&&t.tagName==='IMG'&&t.classList.contains('zoom')){e.preventDefault();e.stopPropagation();var cap=t.getAttribute('data-cap')||decodeURIComponent((t.src.split('/').pop()||'').split('?')[0]);openLightbox(t.src,cap);}},true);
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeLightbox();});
bootProjects();
</script>
<div id="lightbox" onclick="if(event.target.id==='lightbox')closeLightbox()">
  <span id="lbclose" onclick="closeLightbox()" title="Close (Esc)">✕</span>
  <img id="lbimg" src="" alt="" onclick="lbToggleZoom(event)"/>
  <div id="lbcap"><span id="lbcaptxt"></span><a id="lborig" href="#" target="_blank" rel="noopener">open original ↗</a></div>
</div>
